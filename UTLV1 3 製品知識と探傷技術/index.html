<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <style>
        :root { --primary: #007bff; --success: #28a745; --danger: #dc3545; --bg: #f4f7f9; }

        .app-container { max-width: 800px; width: 100%; background: white; padding: 25px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 20px; font-weight: bold; }
        .mode-selection { text-align: center; }
        .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .mode-btn { padding: 12px; font-size: 1rem; cursor: pointer; border-radius: 10px; border: none; background: var(--primary); color: white; font-weight: bold; transition: 0.2s; }
        .mode-btn:hover { opacity: 0.9; transform: scale(1.02); }
        .full-width { grid-column: span 2; padding: 18px; font-size: 1.2rem; }
        .all-challenge { background: #333 !important; }
        .custom-area { grid-column: span 2; background: #f8f9fa; padding: 15px; border-radius: 10px; border: 1px dashed #ccc; margin-top: 10px; }
        .config-area { background: #eee; padding: 15px; border-radius: 10px; margin-bottom: 15px; text-align: left; }
        .question-box { font-size: 1.25rem; line-height: 1.8; margin-bottom: 25px; color: #222; font-weight: 500; white-space: pre-wrap; }
        .q-image { width: 100%; max-height: 400px; object-fit: contain; margin-bottom: 25px; border: 1px solid #eee; border-radius: 8px; display: none; }
        .options-grid { display: grid; gap: 15px; }
        button.option { padding: 20px; border: 2px solid #eee; border-radius: 12px; background: white; text-align: left; cursor: pointer; transition: 0.2s; font-size: 1.05rem; color: #444; line-height: 1.5; }
        button.option:hover:not(:disabled) { border-color: var(--primary); background: #f0f7ff; }
        .correct { background: #e6ffed !important; border-color: #28a745 !important; color: #155724; font-weight: bold; }
        .incorrect { background: #fff5f5 !important; border-color: #dc3545 !important; color: #721c24; }
        .feedback { margin-top: 25px; padding: 20px; border-radius: 12px; display: none; background: #f8f9fa; border: 1px solid #ddd; }
        .next-btn { width: 100%; padding: 18px; color: white; border: none; border-radius: 12px; font-size: 1.2rem; font-weight: bold; cursor: pointer; display: none; margin-top: 20px; background: var(--primary); }
        .result-screen { text-align: center; display: none; }
        .exp-text { margin-top: 10px; font-size: 1.1rem; color: #0056b3; border-top: 1px dashed #ccc; padding-top: 10px; font-weight: bold; }
    </style>
</head>

<div class="app-container">
    <div id="start-screen" class="mode-selection">
        <h2 id="app-title">NDI UT LV1 3</h2>
        <div class="config-area">
            <label style="font-weight:bold; cursor:pointer;">
                <input type="checkbox" id="shuffleCheck" style="transform: scale(1.3); margin-right: 8px;"> 
                出題順をランダム（シャッフル）にする
            </label>
        </div>
        <div class="mode-grid">
            <button class="mode-btn" onclick="startMode(10)">入門（10問）</button>
            <button class="mode-btn" onclick="startMode(20)">初級（20問）</button>
            <button class="mode-btn full-width all-challenge" onclick="startMode('all')">全問チャレンジ</button>
            <div class="custom-area">
                <p style="margin:0 0 10px; font-weight:bold;">【範囲指定モード】</p>
                <input type="number" id="customStart" placeholder="開始番号" style="padding:8px; width:80px;"> 〜 
                <input type="number" id="customEnd" placeholder="終了番号" style="padding:8px; width:80px;">
                <button class="mode-btn" style="padding:8px 20px; margin-left:10px;" onclick="startCustom()">スタート</button>
            </div>
        </div>
    </div>

    <div id="quiz-screen" style="display: none;">
        <div class="header">
            <span id="q-counter">Q. 1 / 10</span>

        <div class="question-box" id="q-text"></div>
        <img id="q-img" class="q-image" src="" alt="問題画像">
        <div class="options-grid" id="options-area"></div>
        <div id="feedback-area" class="feedback">
            <div id="feedback-msg" style="font-size: 1.4rem; font-weight: bold; margin-bottom: 10px;"></div>
            <div id="feedback-exp" class="exp-text"></div>
        </div>
        <button id="next-btn" class="next-btn" onclick="nextQuestion()">次の問題へ</button>
    </div>

    <div id="result-screen" class="result-screen">
        <h2 id="result-msg"></h2>
        <button class="next-btn" style="display:block; background:var(--primary);" onclick="location.reload()">モード選択に戻る</button>
    </div>
</div>

    let pool = []; 
    let currentQuestionIndex = 0;
    let errors = 0;

    function startMode(size) {
        const isShuffle = document.getElementById('shuffleCheck').checked;
        pool = (size === 'all') ? [...quizData] : quizData.slice(0, size);
        if (isShuffle) shuffleArray(pool);
        initQuiz();
    }

    function startCustom() {
        const s = parseInt(document.getElementById('customStart').value);
        const e = parseInt(document.getElementById('customEnd').value);
        if(isNaN(s) || isNaN(e) || s < 1 || e > quizData.length || s > e) {
            alert(`1から${quizData.length}の間で入力してください`); return;
        }
        pool = quizData.slice(s - 1, e);
        if (document.getElementById('shuffleCheck').checked) shuffleArray(pool);
        initQuiz();
    }

    function initQuiz() {
        currentQuestionIndex = 0; errors = 0;
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        loadQuestion();
    }

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    function loadQuestion() {
        if (currentQuestionIndex >= pool.length) { showResult(); return; }
        const qData = pool[currentQuestionIndex];
        document.getElementById('q-counter').innerText = `Q. ${currentQuestionIndex + 1} / ${pool.length}`;
        document.getElementById('q-text').innerText = qData.q;
        
        const imgEl = document.getElementById('q-img');
        if (qData.img) { imgEl.src = qData.img; imgEl.style.display = 'block'; } 
        else { imgEl.style.display = 'none'; }

        const optArea = document.getElementById('options-area');
        optArea.innerHTML = '';
        const prefixes = ['a) ', 'b) ', 'c) ', 'd) ']; //
        qData.options.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'option'; //
            btn.innerText = prefixes[idx] + opt; //
            // ボタンの番号を 1, 2, 3... として渡す
            btn.onclick = () => checkAnswer(idx + 1, btn);
            optArea.appendChild(btn);
        });
        document.getElementById('feedback-area').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
    }

    function checkAnswer(selectedNum, btn) {
        const qData = pool[currentQuestionIndex];
        const btns = document.querySelectorAll('.option');
        btns.forEach(b => b.disabled = true);
        const fb = document.getElementById('feedback-area');
        fb.style.display = 'block';

        // AIが出力する ans (1始まり) と、選択された番号を直接比較
        if (selectedNum === qData.ans) {
            btn.classList.add('correct');
            document.getElementById('feedback-msg').innerHTML = '<span style="color:var(--success);">⭕ 正解！</span>';
        } else {
            btn.classList.add('incorrect');
            // 正解ボタンを光らせる (配列は0始まりなので 1 引く)
            btns[qData.ans - 1].classList.add('correct');
            document.getElementById('feedback-msg').innerHTML = '<span style="color:var(--danger);">❌ 不正解...</span>';
            errors++;
        }
        document.getElementById('feedback-exp').innerText = qData.exp ? "【解説】\n" + qData.exp : "";
        document.getElementById('next-btn').style.display = 'block';
    }

    function nextQuestion() { currentQuestionIndex++; loadQuestion(); }
    function showResult() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('result-msg').innerHTML = `終了！<br>ミス: ${errors} 回`;
    }
</script>
